<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A browser-based demo of CourseFlow using placeholder student and course data.">
    <meta name="theme-color" content="#ffffff">
    <title>CourseFlow | Interactive Demo</title>
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
    <header class="app-header">
        <button class="mobile-menu" id="mobile-menu" type="button" aria-label="Open navigation" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
        <button class="brand" type="button" data-route="home" aria-label="CourseFlow home">
            <img src="assets/logo.png" alt="CourseFlow">
        </button>
        <div class="header-actions">
            <button class="command-button" id="command-button" type="button" title="Search CourseFlow">
                <span class="icon" aria-hidden="true">&#8981;</span>
                <span>Search</span>
                <kbd>Ctrl K</kbd>
            </button>
            <button class="notification-button" id="notification-button" type="button" aria-label="Notifications">
                <span aria-hidden="true">&#128276;</span><i></i>
            </button>
            <button class="account-button" type="button" data-route="profile" aria-label="Open sample profile">
                <span>AM</span>
                <span class="account-copy"><strong>Avery Morgan</strong><small>Student</small></span>
            </button>
        </div>
    </header>

    <div class="demo-banner">
        <span>Portfolio demo</span>
        <p>CourseFlow is running locally with placeholder data. Changes stay in this browser.</p>
        <a href="../projects/">Return to Ethan's projects</a>
    </div>

    <div class="app-layout">
        <aside class="app-sidebar" id="app-sidebar" aria-label="CourseFlow navigation">
            <nav id="primary-nav"></nav>
            <div class="sidebar-bottom">
                <button type="button" data-route="settings"><span class="nav-icon" aria-hidden="true">&#9881;</span><span>Settings</span></button>
                <button type="button" id="reset-demo"><span class="nav-icon" aria-hidden="true">&#8634;</span><span>Reset demo</span></button>
                <a href="https://sdmay26-19.sd.ece.iastate.edu/" target="_blank" rel="noopener noreferrer"><span class="nav-icon" aria-hidden="true">&#8599;</span><span>Original project</span></a>
            </div>
        </aside>

        <main class="app-main" id="app-main" tabindex="-1"></main>
    </div>

    <div class="sidebar-scrim" id="sidebar-scrim"></div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <dialog class="app-dialog" id="app-dialog">
        <form method="dialog" class="dialog-frame">
            <header>
                <div><p id="dialog-kicker"></p><h2 id="dialog-title"></h2></div>
                <button class="icon-button" value="cancel" aria-label="Close dialog">&times;</button>
            </header>
            <div class="dialog-content" id="dialog-content"></div>
        </form>
    </dialog>

    <dialog class="command-dialog" id="command-dialog">
        <form method="dialog">
            <label for="command-search"><span aria-hidden="true">&#8981;</span><span class="sr-only">Search pages and courses</span></label>
            <input id="command-search" type="search" placeholder="Search pages and courses..." autocomplete="off">
            <button value="cancel">Esc</button>
            <div id="command-results"></div>
        </form>
    </dialog>

    <script src="data.js?v=3"></script>
    <script src="app.js?v=3"></script>
    <script src="../site-play.js?v=night-shift-2"></script>
</body>
</html>
