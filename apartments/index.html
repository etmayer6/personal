<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apartment Hunt | Ethan Mayer</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="apartment-body">
    <header class="apartment-header">
        <nav aria-label="Primary navigation">
            <a class="nav-name" href="../index.html">Ethan Mayer</a>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="../resume/">Resume</a></li>
                <li><a aria-current="page" href="../projects/">Projects</a></li>
                <li><a href="../games/">Games</a></li>
                <li><a href="../photos/">Photos</a></li>
            </ul>
        </nav>
    </header>

    <main class="apartments-page">
        <section class="hero">
            <div class="container">
                <p class="eyebrow">Apartment Board</p>
                <h1>Apartment Hunt</h1>
                <p class="hero-copy">
                    A filterable apartment shortlist with practical fit scoring.
                </p>
                <div class="hero-actions">
                    <a class="button-link" href="#listings">Browse listings</a>
                </div>
            </div>
        </section>

        <section id="filters" class="container panel">
            <div class="panel-header">
                <h2>Filters</h2>
                <p id="status-text">Waiting for listing data...</p>
            </div>

            <div class="filter-grid">
                <label>
                    Search
                    <input id="search-input" type="search" placeholder="Title, location, source">
                </label>
                <label>
                    Max all-in
                    <input id="max-all-in-input" type="number" min="0" step="50" value="1300">
                </label>
                <label>
                    Max commute
                    <input id="max-commute-input" type="number" min="0" step="1" value="20">
                </label>
                <label class="checkbox-row">
                    <input id="good-fit-only-input" type="checkbox" checked>
                    Good fit only
                </label>
            </div>
        </section>

        <section class="container panel">
            <div class="panel-header">
                <h2>Shortlist</h2>
            </div>
            <div id="ethan-top-picks" class="listing-grid"></div>
        </section>

        <section id="listings" class="container panel">
            <div class="panel-header">
                <h2>Listings</h2>
                <p id="listing-count-text">0 listings</p>
            </div>
            <div id="error-box" class="error-box hidden"></div>
            <div id="listings-grid" class="listing-grid"></div>
        </section>
    </main>

    <footer class="apartment-footer">
        <p>&copy; 2026 Ethan Mayer</p>
    </footer>

    <script src="config.js"></script>
    <script src="app.js"></script>
    <script src="../site-play.js?v=night-shift-2"></script>
</body>
</html>
