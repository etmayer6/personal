<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="rainbow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4d4d"/>
      <stop offset="16%" stop-color="#ff9f40"/>
      <stop offset="33%" stop-color="#ffe066"/>
      <stop offset="50%" stop-color="#4dff88"/>
      <stop offset="66%" stop-color="#4da6ff"/>
      <stop offset="83%" stop-color="#8a4dff"/>
      <stop offset="100%" stop-color="#ff4dff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="stars" width="160" height="160" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="30" r="2" fill="#fff" opacity="0.28"/>
      <circle cx="120" cy="40" r="1.5" fill="#fff" opacity="0.22"/>
      <circle cx="70" cy="120" r="1.8" fill="#fff" opacity="0.20"/>
      <circle cx="140" cy="140" r="2.2" fill="#fff" opacity="0.18"/>
      <circle cx="40" cy="140" r="1.4" fill="#fff" opacity="0.20"/>
    </pattern>
  </defs>

  <!-- Dark base -->
  <rect width="1200" height="800" fill="#0b1020"/>

  <!-- Rainbow haze -->
  <rect width="1200" height="800" fill="url(#rainbow)" opacity="0.10"/>
  <rect width="1200" height="800" fill="url(#glow)"/>

  <!-- Stars -->
  <rect width="1200" height="800" fill="url(#stars)" opacity="0.65"/>

  <!-- Simple unicorn silhouette (stylized) -->
  <g transform="translate(760,310) scale(1.05)">
    <path d="M-60 190c-10-46 20-95 70-110 22-7 50-7 72 3 10-14 28-24 50-24 12 0 24 3 34 9 20 12 32 34 34 58l28 8-12 38-22-10c-10 20-28 38-52 48 2 24-6 46-22 62l10 48h-36l-10-36h-44l-18 36h-36l18-52c-16-12-28-30-34-50-10-2-20-6-28-12z" fill="#ffffff" opacity="0.12"/>
    <path d="M142 52 206 -22 176 66c18 10 30 28 30 50 0 8-2 16-5 23-10-10-24-18-40-22 1-26-6-47-19-65z" fill="#ffffff" opacity="0.12"/>
    <circle cx="72" cy="108" r="6" fill="#ffffff" opacity="0.14"/>
  </g>

  <!-- A couple of big rainbow arcs -->
  <g opacity="0.18" transform="translate(-120,520)">
    <path d="M0 220c180-210 430-320 720-320 300 0 540 120 720 320" fill="none" stroke="#ff4d4d" stroke-width="26" stroke-linecap="round"/>
    <path d="M0 260c180-210 430-320 720-320 300 0 540 120 720 320" fill="none" stroke="#ff9f40" stroke-width="26" stroke-linecap="round"/>
    <path d="M0 300c180-210 430-320 720-320 300 0 540 120 720 320" fill="none" stroke="#ffe066" stroke-width="26" stroke-linecap="round"/>
    <path d="M0 340c180-210 430-320 720-320 300 0 540 120 720 320" fill="none" stroke="#4dff88" stroke-width="26" stroke-linecap="round"/>
    <path d="M0 380c180-210 430-320 720-320 300 0 540 120 720 320" fill="none" stroke="#4da6ff" stroke-width="26" stroke-linecap="round"/>
    <path d="M0 420c180-210 430-320 720-320 300 0 540 120 720 320" fill="none" stroke="#8a4dff" stroke-width="26" stroke-linecap="round"/>
  </g>
</svg>
